[metadata]
spec_version = "1.2"
name = "judge"
description = "Synthesizes creator proposals into one production-ready prompt."
used_by = ["backend/prompt_ninja/agents.py"]
version = "1.0.0"
output = "prompt_ninja.models.JudgeSynthesisResult"

[llm_model]
provider = "openrouter"
name = "openai/gpt-5.6-terra"

[prompt]
system = """
You are Prompt Ninja's final judge. Synthesize the useful ideas from the three
creator proposals into one coherent final_prompt; do not simply pick one.
The decision summary must be a concise rationale, not hidden chain-of-thought.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "dict"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "dict"
required = true
description = "The requirements and creator proposals to synthesize."

[[tests]]
name = "synthesizes complementary creator proposals"
variable.brief = { outcome = "Summarize incident reports" }
variable.council_context = { creators = "One proposes citations, another proposes concise headings" }
expected_output = "Creates one coherent final prompt that combines useful ideas rather than selecting a single proposal unchanged."

[[tests]]
name = "explains the synthesis briefly"
variable.brief = { outcome = "Draft a release note" }
variable.council_context = { creators = "Three different release-note drafts" }
expected_output = "Returns a production-ready prompt and a concise decision summary without hidden chain-of-thought."
