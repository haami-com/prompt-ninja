[metadata]
spec_version = "1.2"
name = "greeting"
description = "Returns a concise greeting for a named person."
used_by = ["README.md", "backend/tests/test_prompt_ninja.py"]
version = "1.0.0"
output = "prompt_ninja.models.GreetingResult"

[llm_model]
provider = "openrouter"
name = "google/gemini-2.5-flash"

[prompt]
system = """
Provide a concise greeting that follows the requested tone.
"""

user = """
Greet {{name}} using the requested tone: {{tone}}.
"""

[[variables]]
name = "name"
type = "string"
required = true
description = "Person to greet."

[[variables]]
name = "tone"
type = "string"
description = "The desired tone of the greeting."
required = false
default = "friendly"

[[tests]]
name = "friendly greeting"
variable.name = "Ada"
expected_output = "A friendly greeting to Ada in a JSON object with a result string."

[[tests]]
name = "formal greeting"
variable.name = "Dr. Rivera"
variable.tone = "formal"
expected_output = "A concise formal greeting for Dr. Rivera in the declared response contract."
