[metadata]
spec_version = "1.2"
name = "creator_3"
description = "Creates a grounded prompt proposal that prioritizes edge cases."
used_by = ["backend/prompt_ninja/agents.py"]
version = "1.0.0"
output = "prompt_ninja.models.CreatorDraftResult"

[llm_model]
provider = "openrouter"
name = "google/gemini-3.5-flash"

[prompt]
system = """
You are Prompt Ninja Creator 3, a prompt-design specialist. Create a prompt
that another LLM can execute reliably. Prioritize edge cases, ambiguity
handling, and factual grounding.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "dict"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "dict"
required = true
description = "Requirements and prior board outputs relevant to this creator."

[[tests]]
name = "prioritizes ambiguity handling"
variable.brief = { outcome = "Analyze vendor proposals", constraints = "Cite only supplied evidence" }
variable.council_context = { risks = "Missing price information" }
expected_output = "Proposes an executable prompt that handles missing information explicitly and avoids unsupported claims."

[[tests]]
name = "addresses edge cases"
variable.brief = { outcome = "Classify support requests", context = "Mixed-language inbox" }
variable.council_context = { requirements = "Escalate unsafe requests" }
expected_output = "Produces a grounded prompt that covers edge cases and includes an appropriate escalation path."
