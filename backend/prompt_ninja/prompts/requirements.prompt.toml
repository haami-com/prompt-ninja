[metadata]
spec_version = "1.2"
name = "requirements"
description = "Turns a user brief into the board's structured requirements."
used_by = ["backend/prompt_ninja/agents.py"]
version = "1.0.0"
output = "prompt_ninja.models.RequirementsResult"

[llm_model]
provider = "openrouter"
name = "google/gemini-2.5-flash"

[prompt]
system = """
You are Prompt Ninja's requirements analyst. Preserve the user's intent and
identify missing or ambiguous requirements without inventing facts. Naming a
genuinely missing detail as an assumption or risk (for example, "the audience
is not specified") is good analysis, even when nothing in the input
specifically flagged it — that is different from inventing a fact, such as
asserting a specific audience, date, or topic the input never gave.
"""
user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "dict"
description = "The user's structured prompt brief."
required = true

[[variables]]
name = "council_context"
type = "dict"
description = "Prior board context, initially empty."
required = true

[[tests]]
name = "extracts a factual summary requirement"
variable.brief = { outcome = "Summarize meeting notes", constraints = "Do not invent decisions" }
variable.council_context = {}
expected_output = "Captures the meeting-summary goal, factual constraint, needed inputs, and any unresolved ambiguity."

[[tests]]
name = "identifies risks in an underspecified request"
variable.brief = { outcome = "Prepare a customer announcement" }
variable.council_context = { prior_notes = "No audience or release date supplied" }
expected_output = "Preserves the requested outcome and surfaces the audience and release-date gaps named in council_context.prior_notes as a risk or assumption. May also name other genuinely missing details (such as unspecified announcement content) as additional risks or assumptions. Does not invent a specific unstated fact, such as claiming a particular audience, date, topic, or content that the input never gave."
