[metadata]
spec_version = "1.2"
name = "prompt_compiler"
description = "Compiles a tested prompt proposal into a complete Prompt Ninja definition."
used_by = ["backend/prompt_ninja/agents.py"]
version = "1.0.0"
output = "prompt_ninja.prompt_compiler.CompiledPromptResult"

[llm_model]
provider = "openrouter"
name = "google/gemini-2.5-flash"

[prompt]
system = """
You compile a tested prompt proposal into a complete Prompt Ninja 1.2 definition.
Do not include the tests field; the application attaches the verified test fixture
after compilation. Declare every
template placeholder used in either template, with the correct Prompt Ninja type,
required flag, and any safe default. Preserve the proposal's intent while using
the test evidence to make the prompt executable. Use provider "openrouter" and the
requested model.
Do not include variable defaults. Defaults cannot be represented safely in the
compiler's strict structured-output boundary and can be added after export.
metadata.used_by must contain repository-relative consumer file paths with a file
extension, never package or application names. Use [] when no concrete consumer
path is known; never invent a consumer.
For metadata.output, use "String" unless the request explicitly requires
structured JSON, in which case use "prompt_ninja.JsonObjectOutput". Use
"BigInt" only for one integer. Do not invent a dotted Pydantic model path; use
another dotted path only when it appears verbatim in the supplied requirements
or candidate prompt.
For structured JSON, also return output_model with a PascalCase class_name and
one field for every required output property. Use only the supported scalar and
list field types. For String or BigInt, return output_model as null. The CLI will
write this model into the user's project and replace the temporary generic output
path with its real import path. The structured output_model must validate the
actual_output in SELF-TEST EVIDENCE; do not declare fields that contradict the
tested response.
Variable type MUST be one of string/str, integer/int, number/float,
boolean/bool, json, dict, date, datetime, dynamic, list[TYPE], or a real dotted
Pydantic BaseModel path.
Use array and object only when preserving a legacy definition. For Pydantic input
tests, put the model fields in the variable value as a JSON object; never write
executable Python such as Person(...). Templates may use the str, repr, json,
or csv rendering filters when a rendering format is important.
Every test must provide runtime values and natural-language semantic success
criteria. Never invent a Pydantic model path.
"""

user = """
GOAL:
{{goal}}

REQUESTED MODEL:
{{model}}

REQUIREMENTS:
{{requirements}}

CANDIDATE PROMPT:
{{candidate_prompt}}

SELF-TEST EVIDENCE:
{{test_result}}
"""

[[variables]]
name = "goal"
type = "string"
description = "The user goal the compiled prompt must address."
required = true

[[variables]]
name = "model"
type = "string"
description = "The OpenRouter model requested for the generated prompt."
required = true

[[variables]]
name = "requirements"
type = "dict"
description = "The requirements analysis for the prompt."
required = true

[[variables]]
name = "candidate_prompt"
type = "string"
description = "The selected candidate prompt to compile."
required = true

[[variables]]
name = "test_result"
type = "dict"
description = "Evidence from the generated prompt self-test."
required = true

[[tests]]
name = "compiles a tested summarization prompt"
variable.goal = "Summarize weekly project updates"
variable.model = "google/gemini-2.5-flash"
variable.requirements = { output_contract = "Three concise bullets", constraints = "Do not invent facts" }
variable.candidate_prompt = "Summarize the supplied update into three factual bullets."
variable.test_result = { passed = true, score = 0.98 }
expected_output = "Produces a complete Prompt Ninja 1.2 definition with declared variables and a meaningful embedded semantic test."

[[tests]]
name = "preserves typed input requirements"
variable.goal = "Draft a reply using a customer record"
variable.model = "google/gemini-2.5-flash"
variable.requirements = { output_contract = "A professional reply", inputs = "customer record" }
variable.candidate_prompt = "Use {{customer}} to draft a professional reply."
variable.test_result = { passed = true, score = 0.96 }
expected_output = "Produces a valid definition that declares the customer placeholder and uses a testable semantic expectation."
