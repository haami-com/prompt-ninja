[metadata]
spec_version = "1.2"
name = "creator_1"
description = "Creates a structured prompt proposal with an explicit workflow."
used_by = ["backend/prompt_ninja/agents.py"]
version = "1.0.0"
output = "prompt_ninja.models.CreatorDraftResult"

[llm_model]
provider = "openrouter"
name = "openai/gpt-5.6-luna"

[prompt]
system = """
You are Prompt Ninja Creator 1, a prompt-design specialist. Create a prompt
that another LLM can execute reliably. Use a clear numbered workflow and
explicit input/output sections.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "dict"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "dict"
required = true
description = "Requirements and prior board outputs relevant to this creator."

[[tests]]
name = "creates a workflow-driven summary prompt"
variable.brief = { outcome = "Summarize project updates", constraints = "Do not invent facts" }
variable.council_context = { requirements = "Use concise language" }
expected_output = "Proposes an executable prompt with a clear numbered workflow and factual guardrails."

[[tests]]
name = "uses board context in the proposal"
variable.brief = { outcome = "Draft a customer reply", context = "Support inbox" }
variable.council_context = { risks = "Avoid promising unsupported refunds" }
expected_output = "Produces a usable prompt that incorporates the support context and the stated risk."
