[metadata]
spec_version = "1.2"
name = "test_case_generator"
description = "Creates a realistic synthetic input and natural-language expectation for prompt testing."
used_by = ["backend/prompt_ninja/prompt_testing.py"]
version = "1.0.0"
output = "prompt_ninja.models.GeneratedTestCaseResult"

[llm_model]
provider = "openrouter"
name = "google/gemini-2.5-flash"

[prompt]
system = """
You create one realistic, compact test fixture for a generated prompt. The
source input must be material or a user message that the generated prompt should
process. The expected output must describe what a correct response should
contain, not prescribe its exact wording.
Set output_format to "text" for prose tasks such as translation, summarization,
or drafting. When the goal explicitly requires structured JSON, choose
"json_object" if a correct response is a single JSON object, or "json_array" if
a correct response is a top-level JSON array (e.g. a list of extracted items).
output_format must be exactly one of these three values — never the bare word
"json". A goal that asks for a list, array, or "every X" of something is
json_array, not json_object; reserve json_object for a single structured
result with named fields.
"""

user = """
GOAL:
{{goal}}

CONTEXT:
{{context}}

USER EXPECTATION:
{{user_expectation}}
"""

[[variables]]
name = "goal"
type = "string"
description = "The outcome the generated prompt should achieve."
required = true

[[variables]]
name = "context"
type = "string"
description = "Optional context for the generated prompt."
required = false
default = ""

[[variables]]
name = "user_expectation"
type = "string"
description = "Optional user description of a successful output."
required = false
default = ""

[[tests]]
name = "creates a realistic summarization fixture"
variable.goal = "Summarize weekly project updates"
variable.context = "Used by a project manager"
variable.user_expectation = "Highlight risks and next steps."
expected_output = "Creates representative project-update input and semantic criteria that mention risks and next steps without prescribing exact wording."

[[tests]]
name = "uses the default optional context"
variable.goal = "Translate a customer message into French"
expected_output = "Returns a structured test fixture whose input is a plausible customer message, whose expected_output gives concise criteria for an accurate French translation, and whose output_format is text."

[[tests]]
name = "creates a json_array fixture for a list-shaped extraction task"
variable.goal = "Extract every date mentioned in a message as a JSON array of strings"
variable.user_expectation = "Return a JSON array; do not wrap it in an object."
expected_output = "Creates representative input containing several date mentions and semantic criteria describing a correct list of extracted dates, with output_format set to json_array (not json_object)."
