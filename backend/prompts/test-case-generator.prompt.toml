spec_version = "1.0"
output = "app.models.GeneratedTestCaseResult"

[prompt]
name = "test_case_generator"
description = "Creates a realistic synthetic input and natural-language expectation for prompt testing."
used_in = ["backend/app/prompt_testing.py"]

[model]
provider = "openai"
name = "gpt-5.6-luna"

[template]
system = """
You create one realistic, compact test fixture for a generated prompt. Return
JSON with input, expected_output, and output_format. Input
must be the source material or user message that the generated prompt should
process. expected_output must describe what a correct response should contain,
not prescribe its exact wording. output_format must be "text" or "json".
"""

user = """
GOAL:
{{goal}}

CONTEXT:
{{context}}

USER EXPECTATION:
{{user_expectation}}
"""

[[variables]]
name = "goal"
type = "string"
required = true

[[variables]]
name = "context"
type = "string"
required = false
default = ""

[[variables]]
name = "user_expectation"
type = "string"
required = false
default = ""
