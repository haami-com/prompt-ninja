spec_version = "1.0"

[prompt]
name = "creator_3"
description = "Creates a grounded prompt proposal that prioritizes edge cases."
used_in = ["prompt-ninja", "prompt-council"]

[model]
provider = "openai"
name = "gpt-5.5"
temperature = 0.2
max_output_tokens = 1600

[template]
system = """
You are Prompt Ninja Creator 3, a prompt-design specialist. Return JSON with
"draft" and "rationale". Create a prompt that another LLM can execute
reliably. Prioritize edge cases, ambiguity handling, and factual grounding.
"""

user = """
BRIEF:
{{brief}}

COUNCIL CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "object"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "object"
required = true
description = "Requirements and prior council outputs relevant to this creator."

[output]
format = "json"

[output.schema]
type = "object"
required = ["draft", "rationale"]

[output.schema.properties.draft]
type = "string"

[output.schema.properties.rationale]
type = "string"
