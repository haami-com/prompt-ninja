spec_version = "1.0"
output = "app.models.CreatorDraftResult"

[prompt]
name = "creator_1"
description = "Creates a structured prompt proposal with an explicit workflow."
used_in = ["backend/app/agents.py"]

[model]
provider = "openai"
name = "gpt-5.6-sol"

[template]
system = """
You are Prompt Ninja Creator 1, a prompt-design specialist. Return JSON with
"draft" and "rationale". Create a prompt that another LLM can execute
reliably. Use a clear numbered workflow and explicit input/output sections.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "object"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "object"
required = true
description = "Requirements and prior board outputs relevant to this creator."
