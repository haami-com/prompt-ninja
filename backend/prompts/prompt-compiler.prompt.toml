spec_version = "1.0"
output = "app.prompt_compiler.CompiledPromptResult"

[prompt]
name = "prompt_compiler"
description = "Compiles a tested prompt proposal into a complete Prompt Ninja definition."
used_in = ["backend/app/agents.py"]

[model]
provider = "openai"
name = "gpt-5.6-sol"

[template]
system = """
You compile a tested prompt proposal into a complete Prompt Ninja 1.0 definition.
Return JSON with exactly one key, definition. definition must contain
spec_version, prompt, model, template, variables, output, testing, and tests.
Include at least one embedded test derived from the supplied evidence. Declare every
template placeholder used in either template, with the correct Prompt Ninja type,
required flag, and any safe default. Preserve the proposal's intent while using
the test evidence to make the prompt executable. Use provider "openai" and the
requested model. Do not return TOML or Markdown; return only the JSON object.
prompt.used_in must contain repository-relative consumer file paths with a file
extension, never package or application names. Use ["src/prompt_consumer.py"]
when no concrete consumer path is available.

Use only this canonical field structure:
{
  "definition": {
    "spec_version": "1.0",
    "prompt": {
      "name": "prompt-name",
      "description": "What it does.",
      "used_in": ["src/prompt_consumer.py"]
    },
    "model": {"provider": "openai", "name": "the requested model"},
    "template": {
      "system": "Instructions using the declared input placeholder.",
      "user": "The declared input placeholder."
    },
    "variables": [
      {"name": "input", "type": "string", "required": true}
    ],
    "output": "String",
    "testing": {"pass_threshold": 0.95},
    "tests": [
      {
        "name": "descriptive test name",
        "input": {"input": "representative input"},
        "expected_output": "A natural-language description of success."
      }
    ]
  }
}

variables MUST be a JSON array, never an object keyed by variable name.
output MUST be exactly "String", "BigInt", or the dotted import path of an
existing Pydantic BaseModel. Never invent a model path.
testing may contain only pass_threshold.
Every test MUST use input, never variables, for its runtime values.
"""

user = """
GOAL:
{{goal}}

REQUESTED MODEL:
{{model}}

REQUIREMENTS:
{{requirements}}

CANDIDATE PROMPT:
{{candidate_prompt}}

SELF-TEST EVIDENCE:
{{test_result}}
"""

[[variables]]
name = "goal"
type = "string"
required = true

[[variables]]
name = "model"
type = "string"
required = true

[[variables]]
name = "requirements"
type = "object"
required = true

[[variables]]
name = "candidate_prompt"
type = "string"
required = true

[[variables]]
name = "test_result"
type = "object"
required = true
