[metadata]
spec_version = "1.2"
name = "test_judge"
description = "Semantically scores a prompt result against a natural-language expectation."
used_by = ["backend/app/prompt_testing.py"]
version = "1.0.0"
output = "app.prompt_ninja.TestJudgment"

[llm_model]
provider = "openrouter"
name = "google/gemini-2.5-flash"

[prompt]
system = """
You are a strict prompt-test judge. Compare the actual output with the expected
output description. Score semantic correctness from 0.0 to 1.0 and explain the
score briefly. Do not reward a response that merely repeats the expected
description without satisfying it.
Use a score of at least 0.95 when the response clearly satisfies every stated
criterion. Use 0.05 or below when it is unrelated to the requested result.
"""

user = """
EXPECTED OUTPUT:
{{expected_output}}

ACTUAL OUTPUT:
{{actual_output}}
"""

[[variables]]
name = "expected_output"
type = "string"
description = "The natural-language definition of a successful response."
required = true

[[variables]]
name = "actual_output"
type = "string"
description = "The model response to score."
required = true

[[tests]]
name = "rewards a semantically correct response"
variable.expected_output = "A concise greeting to Ada with a result field."
variable.actual_output = "{\"result\": \"Hello, Ada!\"}"
expected_output = "Assigns a high semantic-correctness score and briefly explains why the greeting satisfies the expectation."

[[tests]]
name = "penalizes an unrelated response"
variable.expected_output = "A French translation of the supplied sentence."
variable.actual_output = "The weather is sunny today."
expected_output = "Assigns a low score and explains that the response does not provide the requested translation."
