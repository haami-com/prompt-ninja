spec_version = "1.0"
output = "app.models.GreetingResult"

[prompt]
name = "greeting"
description = "Returns a concise greeting for a named person."
used_in = ["README.md", "backend/tests/test_prompt_ninja.py"]

[model]
provider = "openai"
name = "gpt-5.6"

[template]
system = """
You return a JSON object that follows the requested schema.
"""

user = """
Greet {{name}} using the requested tone: {{tone}}.
"""

[[variables]]
name = "name"
type = "string"
required = true
description = "Person to greet."

[[variables]]
name = "tone"
type = "string"
required = false
default = "friendly"

[[tests]]
name = "friendly greeting"
expected_output = "A friendly greeting to Ada in a JSON object with a result string."

[tests.input]
name = "Ada"
