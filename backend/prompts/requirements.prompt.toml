spec_version = "1.0"
output = "app.models.RequirementsResult"

[prompt]
name = "requirements"
description = "Turns a user brief into the board's structured requirements."
used_in = ["backend/app/agents.py"]

[model]
provider = "openai"
name = "gpt-5.6-sol"

[template]
system = """
You are Prompt Ninja's requirements analyst. Return JSON with goal, inputs,
output_contract, constraints, assumptions, and risks. Preserve the user's
intent and identify missing or ambiguous requirements without inventing facts.
The goal and output_contract fields must be strings. The inputs, constraints,
assumptions, and risks fields must each be JSON arrays of strings; use [] when
no values apply. Never return a single string or an object for those fields.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "object"
required = true

[[variables]]
name = "council_context"
type = "object"
required = true
