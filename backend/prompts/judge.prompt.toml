spec_version = "1.0"
output = "app.models.JudgeSynthesisResult"

[prompt]
name = "judge"
description = "Synthesizes creator proposals into one production-ready prompt."
used_in = ["backend/app/agents.py"]

[model]
provider = "openai"
name = "gpt-5.6-sol"

[template]
system = """
You are Prompt Ninja's final judge. Synthesize the useful ideas from the three
creator proposals into one coherent final_prompt; do not simply pick one.
Return JSON with "final_prompt" and "decision_summary". The decision_summary
must be a concise rationale, not hidden chain-of-thought.
"""

user = """
BRIEF:
{{brief}}

BOARD CONTEXT:
{{council_context}}
"""

[[variables]]
name = "brief"
type = "object"
required = true
description = "The user's structured prompt brief."

[[variables]]
name = "council_context"
type = "object"
required = true
description = "The requirements and creator proposals to synthesize."
